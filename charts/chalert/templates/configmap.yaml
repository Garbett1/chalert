{{- if .Values.rules }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "chalert.fullname" . }}-rules
  labels:
    {{- include "chalert.labels" . | nindent 4 }}
data:
  {{- range $filename, $content := .Values.rules }}
  {{ $filename }}: |
    {{- $content | nindent 4 }}
  {{- end }}
{{- end }}
